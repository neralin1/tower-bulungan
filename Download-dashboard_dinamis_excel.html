function parseExcelToRecords(workbook){
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet, {defval: ''});
  // mapping flexible
  return json.map(r=>{
    const get = (...keys)=>{ for(let k of keys){ if(r[k]!==undefined) return r[k]; const found=Object.keys(r).find(x=>x.toLowerCase().includes(k.toLowerCase())); if(found) return r[found]; } return ''; };
    return {
      "SITE ID": String(get('SITE ID','SITE_ID','ID')||''),
      "SITE NAME": String(get('SITE NAME','SITE_NAME','NAMA SITE')||''),
      "Nama Pemilik Menara": String(get('Nama Pemilik Menara','Pemilik','PEMILIK')||''),
      "KECAMATAN": (()=>{
        let v=String(get('KECAMATAN','Kec','KEC')||'').toUpperCase().trim();
        if(!v || v==='NAN' || v==='-') return null;
        // filter out Selatan if exists
        if(v.includes('SELATAN') && v.includes('PALAS')) return null;
        return v;
      })(),
      "DESA": String(get('DESA','Desa','Kelurahan')||''),
      "Tingi Menara": parseFloat(get('Tingi Menara','Tinggi','TINGGI')||0)||0,
      "Latitude": parseFloat(get('Latitude','LAT','Lat')||0)||null,
      "Longitude": parseFloat(get('Longitude','LONG','Lng','LNG')||0)||null,
      "Tahun Pembangunan": parseInt(get('Tahun Pembangunan','Tahun','TAHUN')||0)||0,
      "Tipe Menara": String(get('Tipe Menara','Tipe','TIPE')||''),
      "Jenis Menara": String(get('Jenis Menara','Jenis','JENIS')||''),
      "Operator Pengguna": String(get('Operator Pengguna','Operator','OPERATOR')||''),
    };
  }).filter(d=>d['SITE ID']||d['SITE NAME']);
}

      const o={}; filtered.forEach(d=>{let v=d[key]; if(!v){if(key==='KECAMATAN') return; v='Lainnya';} o[v]=(o[v]||0)+1;}); return o;
    };
    const draw=(id,type,obj)=>{
      const ctx=document.getElementById(id); if(!ctx) return;
      if(chartsRef.current[id]) chartsRef.current[id].destroy();
      chartsRef.current[id]=new Chart(ctx,{type, data:{labels:Object.keys(obj), datasets:[{data:Object.values(obj), backgroundColor:['#0f172a','#1e293b','#334155','#475569','#64748b','#94a3b8','#e2e8f0','#0ea5e9']}]}, options:{responsive:true, plugins:{legend:{display:type==='doughnut', position:'bottom'}}}});
    };
    const gKec=group('KECAMATAN');
    draw('cKec','bar',gKec);
    draw('cPem','doughnut',group('Nama Pemilik Menara'));
    draw('cTh','bar',group('Tahun Pembangunan'));
  },[filtered]);

  const handleFile=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    setFileName(file.name);
    const reader=new FileReader();
    reader.onload=(evt)=>{
      try{
        const wb=XLSX.read(evt.target.result,{type:'binary'});
        const recs=parseExcelToRecords(wb);
        if(recs.length===0){showToast('Excel kosong / format tidak dikenali'); return;}
        setData(recs);
        showToast('✅ Berhasil load '+recs.length+' menara dari '+file.name);
      }catch(err){showToast('❌ Gagal baca Excel: '+err.message);}
    };
    reader.readAsBinaryString(file);
  };

  const handleDropExcelUrl=()=>{
    const url=prompt('Masukkan URL Excel publik (misal raw.githubusercontent.com/.../data.xlsx):');
    if(!url) return;
    fetch(url).then(r=>r.arrayBuffer()).then(buf=>{
      const wb=XLSX.read(buf,{type:'array'});
      const recs=parseExcelToRecords(wb);
      setData(recs);
      setFileName('Remote: '+url);
      showToast('Loaded '+recs.length+' dari URL');
    }).catch(e=>showToast('Gagal fetch: '+e.message));
  };

  const downloadJson=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='menara_bulungan.json'; a.click();
  };

  const kecList=[...new Set(data.map(d=>d.KECAMATAN).filter(Boolean))].sort();
  const pemilikList=[...new Set(data.map(d=>d['Nama Pemilik Menara']).filter(Boolean))].sort();

  return (
    <div>
      <header className="bg-slate-900 text-white"><div className="max-w-7xl mx-auto px-6 py-6 flex flex-wrap justify-between gap-4"><div><h1 className="text-2xl font-extrabold">Dashboard Dinamis - Menara Bulungan</h1><p className="text-slate-400 text-sm mt-1">Sumber: <span className="text-white">{fileName}</span> • {data.length} menara • {kecList.length} kecamatan valid</p></div><div className="flex gap-2"><button onClick={downloadJson} className="bg-white text-slate-900 px-4 py-2 rounded-xl text-xs font-bold">Export JSON</button><button onClick={handleDropExcelUrl} className="bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl text-xs">Load dari URL</button></div></div></header>
      <div className="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        <div className="bg-white rounded-2xl border p-5 shadow-sm">
          <h3 className="font-bold">📂 Sumber Data Dinamis (Excel)</h3>
          <p className="text-xs text-slate-500 mt-1">Upload file Excel baru, dashboard otomatis update tanpa edit kode. Cocok untuk GitHub Pages.</p>
          <div className="mt-4 flex flex-wrap gap-3 items-center">
            <label className="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm font-semibold cursor-pointer hover:bg-black"><input type="file" accept=".xlsx,.xls" onChange={handleFile} className="hidden"/>Upload Excel (.xlsx)</label>
            <span className="text-xs text-slate-500">Kolom wajib: SITE ID, SITE NAME, Nama Pemilik Menara, KECAMATAN, Latitude, Longitude. Format fleksibel.</span>
          </div>
          <div className="mt-4 bg-slate-50 rounded-xl p-4 text-xs leading-relaxed">
            <b>3 Cara buat dinamis di GitHub Pages:</b><br/>
            <b>1. Upload manual (paling mudah):</b> user upload Excel di dashboard → langsung tampil.<br/>
            <b>2. Auto dari repo (recommended):</b> simpan Excel di repo sebagai <code>data.xlsx</code> di root, lalu dashboard fetch otomatis saat load (gunakan SheetJS). Setiap update Excel → push → Pages otomatis update.<br/>
            <b>3. Google Sheets API:</b> hubungkan Google Sheet publik, ganti fetch URL ke sheets API.
          </div>
        </div>
        <div className="bg-white rounded-2xl p-4 border flex flex-wrap gap-3">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cari..." className="border rounded-xl px-4 py-2.5 text-sm w-full md:w-64"/>
          <select value={kec} onChange={e=>setKec(e.target.value)} className="border rounded-xl px-3 py-2.5 text-sm"><option value="">Semua Kecamatan ({kecList.length})</option>{kecList.map(k=><option key={k} value={k}>{k}</option>)}</select>
          <select value={pemilik} onChange={e=>setPemilik(e.target.value)} className="border rounded-xl px-3 py-2.5 text-sm"><option value="">Semua Pemilik</option>{pemilikList.map(p=><option key={p} value={p}>{p}</option>)}</select>
          <button onClick={()=>{setSearch('');setKec('');setPemilik('');}} className="ml-auto bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm">Reset</button>
        </div>
        <div className="grid md:grid-cols-3 gap-6">
          <div className="bg-white rounded-2xl p-5 border"><h3 className="font-bold text-sm">Per Kecamatan</h3><canvas id="cKec"></canvas></div>
          <div className="bg-white rounded-2xl p-5 border"><h3 className="font-bold text-sm">Per Pemilik</h3><canvas id="cPem"></canvas></div>
          <div className="bg-white rounded-2xl p-5 border"><h3 className="font-bold text-sm">Tahun</h3><canvas id="cTh"></canvas></div>
        </div>
        <div id="map" className="rounded-2xl border"></div>
        <div className="bg-white rounded-2xl border overflow-hidden"><div className="p-4 border-b"><h3 className="font-bold">Tabel {filtered.length} menara</h3></div><div className="overflow-auto max-h-[500px]"><table className="w-full text-sm"><thead className="sticky top-0 bg-slate-100"><tr><th className="p-2 text-left">ID</th><th className="p-2 text-left">Nama</th><th className="p-2">Kec</th><th className="p-2">Koordinat</th></tr></thead><tbody>{filtered.map(d=><tr key={d['SITE ID']} className="border-b"><td className="p-2 font-mono text-xs">{d['SITE ID']}</td><td className="p-2">{d['SITE NAME']}</td><td className="p-2 text-center">{d.KECAMATAN||'Tidak Terdata'}</td><td className="p-2 text-xs">{d.Latitude},{d.Longitude}</td></tr>)}</tbody></table></div></div>
      </div>
      {toast && <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-sm z-50">{toast}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
